// =================== EVENT HANDLING ===================
function attachListeners() {
  // No-op: we use event delegation globally (see initDelegation below)
}

// Global event delegation - registered once. Survives re-renders.
let _delegationInited = false;
function initDelegation() {
  if (_delegationInited) return;
  _delegationInited = true;
  // Use bubble phase (default) - more reliable across browsers (especially Safari)
  document.addEventListener('click', (e) => {
    // Action handler
    const actionTarget = e.target.closest('[data-action]');
    if (actionTarget) {
      e.stopPropagation();
      handleAction(actionTarget.dataset.action);
      return;
    }
    // Modal action handler (skip inputs/textareas/selects which use other listeners)
    const mactTarget = e.target.closest('[data-mact]');
    if (mactTarget) {
      const tag = mactTarget.tagName;
      if (tag === 'SELECT' || tag === 'INPUT' || tag === 'TEXTAREA') return;
      e.stopPropagation();
      handleModalAction(mactTarget.dataset.mact, mactTarget.value);
    }
  });
  // Select changes (for modal dropdowns)
  document.addEventListener('change', (e) => {
    const target = e.target.closest('[data-mact]');
    if (target && target.tagName === 'SELECT') {
      handleModalAction(target.dataset.mact, target.value);
    }
  });
}

function attachModalListeners() {
  // No-op for action wiring (delegation handles it).
  // But still wire the raw textarea / file input handlers needed inline.
}

function handleAction(a) {
  const [cmd, ...rest] = a.split(':');
  const arg = rest.join(':');
  switch (cmd) {
    case 'tab': state.currentTab = arg; render(); break;
    case 'goto': state.currentTab = arg; render(); break;
    case 'mode': state.mode = arg; render(); break;
    case 'period': statsPeriod = parseInt(arg); render(); break;
    case 'chart': statsChart = arg; render(); break;
    case 'recap-open':
      const [ry, rm] = arg.split('-').map(Number);
      openRecap(ry, rm);
      break;
    case 'recap-close': closeRecap(); break;
    case 'recap-next': nextRecapSlide(); break;
    case 'recap-prev': prevRecapSlide(); break;
    case 'cal':
      if (arg === 'prev') {
        state.cal.month--;
        if (state.cal.month < 0) { state.cal.month = 11; state.cal.year--; }
      } else if (arg === 'next') {
        state.cal.month++;
        if (state.cal.month > 11) { state.cal.month = 0; state.cal.year++; }
      }
      render(); break;
    case 'select-day':
      state.selectedDate = arg;
      state.currentTab = 'day';
      render();
      break;
    case 'open':
      handleOpen(arg);
      break;
    case 'logout':
      if (confirm('Sair da conta?')) logout();
      break;
    case 'del-session':
      if (confirm('Deletar este treino?')) {
        state.data.sessions = state.data.sessions.filter(s => s.id !== arg);
        persistUser(); render(); showToast('Treino deletado');
      }
      break;
    case 'edit-session':
      openEditSessionModal(arg);
      break;
    case 'del-comp':
      if (confirm('Deletar esta competição?')) {
        state.data.comps = state.data.comps.filter(c => c.id !== arg);
        persistUser(); render(); showToast('Competição deletada');
      }
      break;
    case 'del-partner':
      if (confirm('Deletar este parceiro? Os registros existentes não serão afetados.')) {
        state.data.partners = state.data.partners.filter(p => p.id !== arg);
        persistUser(); render(); showToast('Parceiro removido');
      }
      break;
    case 'edit-partner':
      openEditPartnerModal(arg);
      break;
    case 'view-comp':
      const comp = state.data.comps.find(c => c.id === arg);
      if (comp) { state.selectedDate = comp.date; state.currentTab = 'day'; render(); }
      break;
    case 'toggle-plan':
      const idx = parseInt(arg);
      const wk = getCurrentWeekProgress();
      // getCurrentWeekProgress already migrates/initializes the structure
      state.data.weekPlans[wk.weekKey][state.mode][idx] = !state.data.weekPlans[wk.weekKey][state.mode][idx];
      persistUser(); render();
      break;
  }
}

function handleOpen(arg) {
  const [type, param] = arg.split('-date:');
  if (arg === 'new-session' || type === 'new-session') openSessionModal(param || todayISO());
  else if (arg === 'new-comp') openCompModal();
  else if (arg === 'new-partner') openPartnerModal();
  else if (arg === 'edit-profile') openProfileModal();
}

// =================== MONTHLY RECAP (WRAPPED) ===================
const RECAP_THEMES = [
  { bg: 'linear-gradient(135deg, #ff4444 0%, #cc1f5c 100%)' }, // vermelho
  { bg: 'linear-gradient(135deg, #6644aa 0%, #2a1f5c 100%)' }, // roxo
  { bg: 'linear-gradient(135deg, #ff8833 0%, #cc4422 100%)' }, // laranja
  { bg: 'linear-gradient(135deg, #2a9e44 0%, #1a5c2e 100%)' }, // verde
  { bg: 'linear-gradient(135deg, #4488ff 0%, #2a3a8a 100%)' }, // azul
  { bg: 'linear-gradient(135deg, #ffaa33 0%, #cc6622 100%)' }, // amber
  { bg: 'linear-gradient(135deg, #aa66ff 0%, #5a2a8a 100%)' }, // violeta
  { bg: 'linear-gradient(135deg, #ff6699 0%, #aa2a5c 100%)' }, // rosa
  { bg: 'linear-gradient(135deg, #44cccc 0%, #1a5c5c 100%)' }, // ciano
  { bg: 'linear-gradient(135deg, #ff4444 0%, #ff8833 100%)' }, // gradient finale
];

let recapState = { active: false, year: 0, month: 0, slideIdx: 0, slides: [] };

function buildRecapSlides(recap) {
  const slides = [];
  const monthCap = recap.monthName.charAt(0).toUpperCase() + recap.monthName.slice(1);

  // Slide 1: Capa
  slides.push({
    title: `Sua jornada em ${monthCap}`,
    render: () => `
      <div class="recap-content">
        <div class="recap-emoji">🥋</div>
        <div class="recap-label">Retrospectiva</div>
        <div class="recap-big" style="font-size:56px">${monthCap.toUpperCase()}</div>
        <div class="recap-big-sub" style="font-size:32px;font-family:'Bebas Neue';letter-spacing:0.04em">${recap.year}</div>
        <div class="recap-body" style="margin-top:24px">Bora ver como foi seu mês no tatame?</div>
      </div>`
  });

  // Slide 2: Volume — treinos
  const prevDiff = recap.sessions - recap.prev.sessions;
  const sessionMsg = recap.prev.sessions === 0
    ? `Bora manter o ritmo no próximo!`
    : prevDiff > 0
      ? `${prevDiff} ${prevDiff === 1 ? 'treino a mais' : 'treinos a mais'} que ${recap.prev.sessions === 1 ? 'o mês passado' : 'em ' + recap.prev.sessions}!`
      : prevDiff < 0
        ? `${Math.abs(prevDiff)} ${Math.abs(prevDiff) === 1 ? 'a menos' : 'a menos'} que o mês passado.`
        : `Mantendo o ritmo do mês passado.`;
  slides.push({
    title: 'Volume',
    render: () => `
      <div class="recap-content">
        <div class="recap-emoji">🔥</div>
        <div class="recap-label">Você apareceu no tatame</div>
        <div class="recap-big">${recap.sessions}</div>
        <div class="recap-big-sub">${recap.sessions === 1 ? 'vez' : 'vezes'}</div>
        <div class="recap-body">${sessionMsg}</div>
      </div>`
  });

  // Slide 3: Horas no tatame
  const hoursDiffPct = recap.prev.hours > 0 ? Math.round((recap.hours - recap.prev.hours) / recap.prev.hours * 100) : null;
  const hoursMsg = hoursDiffPct == null
    ? `Cada minuto conta.`
    : hoursDiffPct > 0
      ? `${hoursDiffPct}% a mais que mês passado.`
      : hoursDiffPct < 0
        ? `${Math.abs(hoursDiffPct)}% a menos que mês passado.`
        : `Mesmo tempo de treino do mês passado.`;
  slides.push({
    title: 'Tempo no tatame',
    render: () => `
      <div class="recap-content">
        <div class="recap-emoji">⏱️</div>
        <div class="recap-label">Horas treinando</div>
        <div class="recap-big">${recap.hours}<span style="font-size:32px">h</span></div>
        <div class="recap-big-sub">${recap.rolls} rolas no total</div>
        <div class="recap-body">${hoursMsg}</div>
      </div>`
  });

  // Slide 4: Finalização favorita
  if (recap.topSub) {
    slides.push({
      title: 'Finalização favorita',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">🏆</div>
          <div class="recap-label">Sua finalização</div>
          <div class="recap-headline">${escapeHtml(recap.topSub[0])}</div>
          <div class="recap-body">Aplicada <b>${recap.topSub[1]} ${recap.topSub[1] === 1 ? 'vez' : 'vezes'}</b> este mês.<br>É o seu golpe.</div>
        </div>`
    });
  }

  // Slide 5: Combinação favorita (posição → finalização)
  if (recap.topCombo) {
    const [pos, sub] = recap.topCombo[0].split(' → ');
    slides.push({
      title: 'Combinação mais frequente',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">⚡</div>
          <div class="recap-label">Combinação favorita</div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px">
            <div style="background:rgba(255,255,255,0.2);padding:10px 20px;border-radius:20px;font-size:18px;font-weight:500">${escapeHtml(pos)}</div>
            <div style="font-size:24px">↓</div>
            <div style="background:rgba(255,255,255,0.9);color:#000;padding:10px 20px;border-radius:20px;font-size:18px;font-weight:600">${escapeHtml(sub)}</div>
          </div>
          <div class="recap-body">${recap.topCombo[1]}× este mês.<br>Seu caminho preferido até a finalização.</div>
        </div>`
    });
  }

  // Slide 6: Vulnerabilidade (onde mais caiu)
  if (recap.topVulnerability) {
    const [pos, sub] = recap.topVulnerability[0].split(' → ');
    slides.push({
      title: 'Onde você caiu',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">🛡️</div>
          <div class="recap-label">Sua kryptonita</div>
          <div class="recap-headline">${escapeHtml(pos)}<br><span style="font-size:24px;opacity:0.8">→ ${escapeHtml(sub)}</span></div>
          <div class="recap-body">Sofreu <b>${recap.topVulnerability[1]}×</b> esse mês.<br>Mês que vem, vamos trabalhar essa defesa?</div>
        </div>`
    });
  }

  // Slide 7: Parceiro mais frequente
  if (recap.topPartner) {
    slides.push({
      title: 'Parceiro mais frequente',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">🤝</div>
          <div class="recap-label">Seu sparring</div>
          <div class="recap-headline">${escapeHtml(recap.topPartner.name)}</div>
          <div class="recap-body">${escapeHtml(recap.topPartner.belt)} · ${recap.topPartner.weight}kg<br>Quem mais rolou com você esse mês.</div>
        </div>`
    });
  }

  // Slide 8: Mood médio
  if (recap.avgMood != null) {
    const avgRounded = Math.round(recap.avgMood * 10) / 10;
    const intMood = Math.round(avgRounded);
    slides.push({
      title: 'Como você se sentiu',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">${moodEmoji(intMood)}</div>
          <div class="recap-label">Energia média</div>
          <div class="recap-big">${avgRounded.toFixed(1)}<span style="font-size:32px;opacity:0.6">/10</span></div>
          <div class="recap-big-sub">${moodLabel(intMood)}</div>
          <div class="recap-body">Baseado em ${recap.moodCount} ${recap.moodCount === 1 ? 'treino registrado' : 'treinos registrados'} com mood.</div>
        </div>`
    });
  }

  // Slide 9: Streak / consistência
  if (recap.maxStreak >= 2) {
    slides.push({
      title: 'Consistência',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">⚡</div>
          <div class="recap-label">Sua maior sequência</div>
          <div class="recap-big">${recap.maxStreak}</div>
          <div class="recap-big-sub">dias seguidos no tatame</div>
          <div class="recap-body">Sem desculpa. Treino bate ponto.</div>
        </div>`
    });
  }

  // Slide 10: Competição (se teve)
  if (recap.comps > 0) {
    slides.push({
      title: 'Competições',
      render: () => `
        <div class="recap-content">
          <div class="recap-emoji">🥇</div>
          <div class="recap-label">Você competiu</div>
          <div class="recap-big">${recap.comps}</div>
          <div class="recap-big-sub">${recap.comps === 1 ? 'campeonato' : 'campeonatos'} esse mês</div>
          <div class="recap-body">Coragem de quem encara o chaveamento.</div>
        </div>`
    });
  }

  // Slide final: encerramento
  const totalCombat = recap.applied + recap.suffered;
  const finalMsg = recap.applied > recap.suffered
    ? 'Mais aplicadas que sofridas. Tá no caminho.'
    : recap.applied === recap.suffered && recap.applied > 0
      ? 'Aplicou e sofreu em peso igual. Aprendizado dos dois lados.'
      : totalCombat > 0
        ? 'Comeu cera, mas a vivência conta. Bora pra cima.'
        : 'Cada treino é um passo. Continua.';
  slides.push({
    title: 'Bora pro próximo',
    render: () => `
      <div class="recap-content">
        <div class="recap-emoji">🥋</div>
        <div class="recap-label">${monthCap} foi assim</div>
        <div class="recap-headline">${recap.sessions} ${recap.sessions === 1 ? 'treino' : 'treinos'}<br>${recap.hours}h no tatame<br>${recap.applied} ${recap.applied === 1 ? 'finalização' : 'finalizações'}</div>
        <div class="recap-body" style="margin-top:18px">${finalMsg}</div>
        <div style="margin-top:32px"><button class="recap-share-btn" style="position:static;transform:none" data-action="recap-close">Fechar retrospectiva</button></div>
      </div>`
  });

  return slides;
}

function openRecap(year, month) {
  const recap = computeMonthlyRecap(year, month);
  if (!recap.hasData) {
    showToast('Sem treinos neste mês pra montar a retrospectiva', 'error');
    return;
  }
  const slides = buildRecapSlides(recap);
  recapState = { active: true, year, month, slideIdx: 0, slides, recap };
  // Mark as seen
  const key = `${year}-${String(month + 1).padStart(2, '0')}`;
  if (!state.data.recapsDismissed) state.data.recapsDismissed = {};
  state.data.recapsDismissed[key] = true;
  persistUser();
  renderRecap();
}

function renderRecap() {
  if (!recapState.active) return;
  // Remove existing
  const existing = document.querySelector('.recap-overlay');
  if (existing) existing.remove();

  const { slideIdx, slides } = recapState;
  const slide = slides[slideIdx];
  const theme = RECAP_THEMES[slideIdx % RECAP_THEMES.length];

  const div = document.createElement('div');
  div.className = 'recap-overlay';
  div.innerHTML = `
    <div class="recap-slide" style="background:${theme.bg}">
      <div class="recap-progress">
        ${slides.map((_, i) => `<div class="recap-progress-bar ${i < slideIdx ? 'done' : i === slideIdx ? 'active' : ''}"></div>`).join('')}
      </div>
      <button class="recap-close" data-action="recap-close"><i class="ti ti-x" style="font-size:18px"></i></button>
      <div class="recap-nav-zone recap-nav-prev" data-action="recap-prev"></div>
      <div class="recap-nav-zone recap-nav-next" data-action="recap-next"></div>
      ${slide.render()}
      ${slideIdx < slides.length - 1 ? `<div class="recap-hint">Toque pra avançar →</div>` : ''}
    </div>`;
  document.body.appendChild(div);

  // Auto-advance after 4s (matches CSS animation)
  if (recapState._autoTimer) clearTimeout(recapState._autoTimer);
  if (slideIdx < slides.length - 1) {
    recapState._autoTimer = setTimeout(() => {
      if (recapState.active && recapState.slideIdx === slideIdx) {
        recapState.slideIdx++;
        renderRecap();
      }
    }, 4000);
  }
}

function closeRecap() {
  if (recapState._autoTimer) clearTimeout(recapState._autoTimer);
  recapState = { active: false, year: 0, month: 0, slideIdx: 0, slides: [] };
  const el = document.querySelector('.recap-overlay');
  if (el) el.remove();
  render();
}

function nextRecapSlide() {
  if (!recapState.active) return;
  if (recapState.slideIdx < recapState.slides.length - 1) {
    recapState.slideIdx++;
    renderRecap();
  } else {
    closeRecap();
  }
}

function prevRecapSlide() {
  if (!recapState.active) return;
  if (recapState.slideIdx > 0) {
    recapState.slideIdx--;
    renderRecap();
  }
}

// =================== MODALS ===================
let modalState = {};

function openModal(html) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.innerHTML = `<div class="modal">${html}</div>`;
  // Only close when click lands directly on the overlay backdrop (not on children)
  div.addEventListener('click', (e) => {
    if (e.target === div) closeModal();
  });
  document.body.appendChild(div);
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
  modalState = {};
}

// ---------- SESSION MODAL ----------
function openSessionModal(date) {
  let initDate = date || todayISO();
  if (initDate > todayISO()) initDate = todayISO();
  modalState = {
    _kind: 'session',
    _editingId: null,
    date: initDate,
    mode: state.mode,
    duration: 60,
    rollCount: 3,
    rolls: [makeEmptyRoll(), makeEmptyRoll(), makeEmptyRoll()],
    expandedRoll: 0,
    notes: '',
    mood: null,
    _newPartnerForRollIdx: null
  };
  renderSessionModal();
}

function openEditSessionModal(sessionId) {
  const s = state.data.sessions.find(x => x.id === sessionId);
  if (!s) { showToast('Treino não encontrado', 'error'); return; }
  // Rebuild rolls structure from rollDetails if available, else fallback to flat
  let rolls;
  if (s.rollDetails && Array.isArray(s.rollDetails) && s.rollDetails.length > 0) {
    rolls = s.rollDetails.map(r => ({
      partnerId: r.partnerId || '',
      applied: (r.applied || []).map(a => ({ position: a.position || '', submission: a.submission || '' })),
      suffered: (r.suffered || []).map(x => ({ position: x.position || '', submission: x.submission || '' })),
      notes: r.notes || ''
    }));
  } else {
    // Legacy session sem rollDetails: reconstroi com 1 roll só, agrupando tudo
    const rollCount = s.rolls || 1;
    rolls = [];
    for (let i = 0; i < rollCount; i++) rolls.push(makeEmptyRoll());
    // Empurra applied/suffered todos pra primeira rola
    if (rolls[0]) {
      rolls[0].applied = (s.applied || []).map(a => ({ position: a.position, submission: a.submission }));
      rolls[0].suffered = (s.suffered || []).map(x => ({ position: x.position, submission: x.submission }));
      rolls[0].partnerId = (s.partners && s.partners[0]) || '';
    }
  }
  modalState = {
    _kind: 'session',
    _editingId: s.id,
    date: s.date,
    mode: s.mode,
    duration: s.duration || 60,
    rollCount: rolls.length,
    rolls,
    expandedRoll: 0,
    notes: s.notes || '',
    mood: s.mood == null ? null : s.mood,
    _newPartnerForRollIdx: null
  };
  renderSessionModal();
}

function makeEmptyRoll() {
  return { partnerId: '', applied: [], suffered: [], notes: '' };
}

function adjustRollCount(newCount) {
  newCount = Math.max(0, Math.min(50, newCount));
  while (modalState.rolls.length < newCount) modalState.rolls.push(makeEmptyRoll());
  while (modalState.rolls.length > newCount) modalState.rolls.pop();
  modalState.rollCount = newCount;
  if (modalState.expandedRoll >= newCount) modalState.expandedRoll = Math.max(0, newCount - 1);
}

    moodEl.addEventListener('change', updateMoodUI);
  }
}

function handleModalAction(a, val) {
  const [cmd, ...rest] = a.split(':');
  const arg = rest.join(':');
  switch (cmd) {
    case 'close': closeModal(); break;
    case 'm-mode':
      syncSessionInputs();
      modalState.mode = arg;
      renderSessionModal();
      break;
    case 'rolls':
      syncSessionInputs();
      adjustRollCount(modalState.rollCount + parseInt(arg));
      renderSessionModal();
      break;
    case 'toggle-roll':
      syncSessionInputs();
      const ti = parseInt(arg);
      modalState.expandedRoll = (modalState.expandedRoll === ti) ? -1 : ti;
      renderSessionModal();
      break;
    case 'set-roll-partner':
      modalState.rolls[parseInt(arg)].partnerId = val;
      break;
    case 'new-partner-for-roll':
      syncSessionInputs();
      modalState._newPartnerForRollIdx = parseInt(arg);
      // Save session modal state aside and open partner modal
      window._savedSessionModal = JSON.parse(JSON.stringify(modalState));
      openPartnerModal((newPartnerId) => {
        // Restore session modal and auto-assign new partner to that roll
        modalState = window._savedSessionModal;
        delete window._savedSessionModal;
        if (newPartnerId !== undefined && modalState._newPartnerForRollIdx !== null) {
          modalState.rolls[modalState._newPartnerForRollIdx].partnerId = newPartnerId;
        }
        modalState._newPartnerForRollIdx = null;
        renderSessionModal();
      });
      break;
    case 'add-applied': {
      syncSessionInputs();
      modalState.rolls[parseInt(arg)].applied.push({ position: '', submission: '' });
      renderSessionModal();
      break;
    }
    case 'rm-applied': {
      syncSessionInputs();
      const [ri, ai] = arg.split('|').map(n => parseInt(n));
      modalState.rolls[ri].applied.splice(ai, 1);
      renderSessionModal();
      break;
    }
    case 'set-applied': {
      const [ri, ai, field] = arg.split('|');
      modalState.rolls[parseInt(ri)].applied[parseInt(ai)][field] = val;
      break;
    }
    case 'add-suffered': {
      syncSessionInputs();
      modalState.rolls[parseInt(arg)].suffered.push({ position: '', submission: '' });
      renderSessionModal();
      break;
    }
    case 'rm-suffered': {
      syncSessionInputs();
      const [ri, si] = arg.split('|').map(n => parseInt(n));
      modalState.rolls[ri].suffered.splice(si, 1);
      renderSessionModal();
      break;
    }
    case 'set-suffered': {
      const [ri, si, field] = arg.split('|');
      modalState.rolls[parseInt(ri)].suffered[parseInt(si)][field] = val;
      break;
    }
    case 'save-session':
      syncSessionInputs();
      saveSession();
      break;
    // COMP actions
    case 'save-comp':
      syncCompInputs();
      saveComp();
      break;
    case 'comp-result':
      modalState.result = arg;
      syncCompInputs();
      renderCompModal();
      break;
    case 'comp-mode':
      modalState.mode = arg;
      syncCompInputs();
      renderCompModal();
      break;
    case 'add-match':
      syncCompInputs();
      modalState.matches.push({ round: '', opponent: '', team: '', result: 'win', type: '', submission: '', score: '' });
      renderCompModal();
      break;
    case 'rm-match':
      syncCompInputs();
      modalState.matches.splice(parseInt(arg), 1);
      renderCompModal();
      break;
    case 'set-match':
      const [idx, field] = arg.split('|');
      modalState.matches[parseInt(idx)][field] = val;
      break;
    // Partner
    case 'save-partner':
      savePartner();
      break;
    // Profile
    case 'save-profile':
      saveProfile();
      break;
    case 'rm-photo':
      syncProfileInputs();
      modalState.photo = null;
      renderProfileModal();
      break;
    case 'age-change':
      break;
  }
}

function syncSessionInputs() {
  if (modalState._kind !== 'session') return;
  const dateEl = document.getElementById('m-date');
  const durEl = document.getElementById('m-duration');
  const notesEl = document.getElementById('m-notes');
  if (dateEl) {
    let v = dateEl.value;
    // Defensive: even if browser allowed future date, clamp to today
    if (v && v > todayISO()) {
      v = todayISO();
      dateEl.value = v;
    }
    modalState.date = v;
  }
  if (durEl) modalState.duration = parseInt(durEl.value) || 0;
  if (notesEl) modalState.notes = notesEl.value;
  document.querySelectorAll('[data-roll-notes]').forEach(el => {
    const i = parseInt(el.dataset.rollNotes);
    if (modalState.rolls[i]) modalState.rolls[i].notes = el.value;
  });
}

function saveSession() {
  if (!modalState.date) { alert('Selecione uma data'); return; }
  if (modalState.date > todayISO()) { showToast('Data futura não permitida', 'error'); return; }
  // Flatten roll data into legacy `applied` and `suffered` arrays for stats compatibility
  const allApplied = [];
  const allSuffered = [];
  const partnerSet = new Set();
  modalState.rolls.forEach(roll => {
    if (roll.partnerId) partnerSet.add(roll.partnerId);
    (roll.applied || []).filter(a => a.position && a.submission).forEach(a => {
      allApplied.push({ position: a.position, submission: a.submission, partnerId: roll.partnerId || '' });
    });
    (roll.suffered || []).filter(x => x.position && x.submission).forEach(x => {
      allSuffered.push({ position: x.position, submission: x.submission, partnerId: roll.partnerId || '' });
    });
  });
  const isEdit = !!modalState._editingId;
  const sessionData = {
    id: modalState._editingId || uid(),
    date: modalState.date,
    mode: modalState.mode,
    duration: modalState.duration,
    rolls: modalState.rollCount,
    partners: Array.from(partnerSet),
    applied: allApplied,
    suffered: allSuffered,
    rollDetails: modalState.rolls.map(r => ({ partnerId: r.partnerId, applied: r.applied, suffered: r.suffered, notes: r.notes })),
    notes: modalState.notes,
    mood: modalState.mood
  };
  if (isEdit) {
    const idx = state.data.sessions.findIndex(s => s.id === modalState._editingId);
    if (idx >= 0) state.data.sessions[idx] = sessionData;
  } else {
    state.data.sessions.push(sessionData);
  }
  persistUser();
  closeModal();
  showToast(isEdit ? 'Treino atualizado!' : 'Treino salvo!');
  render();
}

function syncCompInputs() {
  const name = document.getElementById('c-name');
  const date = document.getElementById('c-date');
  const cat = document.getElementById('c-category');
  const w = document.getElementById('c-weight');
  if (name) modalState.name = name.value;
  if (date) {
    let v = date.value;
    if (v && v > todayISO()) { v = todayISO(); date.value = v; }
    modalState.date = v;
  }
  if (cat) modalState.category = cat.value;
  if (w) modalState.weightClass = w.value;
  // Sync match text fields
  document.querySelectorAll('[data-mact^="set-match:"]').forEach(el => {
    if (el.tagName === 'INPUT') {
      const [, arg] = el.dataset.mact.split(':');
      const [idx, field] = arg.split('|');
      if (modalState.matches[parseInt(idx)]) modalState.matches[parseInt(idx)][field] = el.value;
    }
  });
}

        </div>
        <label style="position:absolute;bottom:-4px;right:-4px;width:30px;height:30px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--bg)">
          <i class="ti ti-camera" style="font-size:14px;color:#fff"></i>
          <input type="file" id="pr-photo" accept="image/*" style="display:none">
        </label>
      </div>
      ${modalState.photo ? `<button class="btn-dashed" style="max-width:140px;font-size:11px;padding:6px" data-mact="rm-photo"><i class="ti ti-trash" style="font-size:11px;vertical-align:-1px"></i> Remover foto</button>` : ''}
    </div>
    <div class="card">
      <div class="input-row"><label>Nome</label><input type="text" id="pr-name" value="${escapeHtml(modalState.name)}"></div>
      <div class="input-grid-3">
        <div class="input-row"><label>Idade</label><input type="number" id="pr-age" value="${modalState.age || ''}" min="3" max="99" data-mact="age-change"></div>
        <div class="input-row"><label>Gênero</label>
          <select id="pr-gender">
            <option value="male" ${modalState.gender === 'male' ? 'selected' : ''}>Masculino</option>
            <option value="female" ${modalState.gender === 'female' ? 'selected' : ''}>Feminino</option>
          </select>
        </div>
        <div class="input-row"><label>Peso (kg)</label><input type="number" id="pr-weight" value="${modalState.weight}" min="20" max="200"></div>
      </div>
      ${modalState.age && modalState.age < 16 ? `<p style="font-size:10px;color:var(--text-3);margin:-4px 0 8px;text-align:center"><i class="ti ti-info-circle" style="font-size:10px;vertical-align:-1px"></i> Sistema de faixas IBJJF Kids ativado</p>` : ''}
      <div class="input-grid-2">
        <div class="input-row"><label>Faixa</label>
          <select id="pr-belt">
            ${beltsList.map(b => `<option ${validBelt === b ? 'selected' : ''}>${b}</option>`).join('')}
          </select>
        </div>
        <div class="input-row"><label>Graus</label>
          <select id="pr-degrees">
            ${[0,1,2,3,4].map(d => `<option ${modalState.degrees === d ? 'selected' : ''} value="${d}">${d}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="input-row"><label>Academia</label><input type="text" id="pr-gym" value="${escapeHtml(modalState.gym)}" placeholder="Nome da academia"></div>
      <div class="input-row"><label>Começou em</label><input type="number" id="pr-started" value="${modalState.startedAt}" min="1980" max="${new Date().getFullYear()}"></div>
    </div>
    <button class="btn-primary" data-mact="save-profile"><i class="ti ti-check" style="vertical-align:-2px"></i> Salvar</button>
    <div style="height:20px"></div>
  `);
  attachModalListeners();
  // Handle photo input + age live-update
  const photoInput = document.getElementById('pr-photo');
  if (photoInput) photoInput.addEventListener('change', handlePhotoSelect);
  const ageInput = document.getElementById('pr-age');
  if (ageInput) ageInput.addEventListener('change', () => {
    syncProfileInputs();
    renderProfileModal();
  });
}

function syncProfileInputs() {
  const ids = { 'pr-name':'name', 'pr-age':'age', 'pr-gender':'gender', 'pr-weight':'weight', 'pr-belt':'belt', 'pr-degrees':'degrees', 'pr-gym':'gym', 'pr-started':'startedAt' };
  for (const id in ids) {
    const el = document.getElementById(id);
    if (!el) continue;
    let v = el.value;
    if (['age','weight','degrees','startedAt'].includes(ids[id])) v = parseInt(v) || 0;
    modalState[ids[id]] = v;
  }
}

async function handlePhotoSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  // Read + resize to ~300px, jpeg 0.85 quality
  const dataUrl = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = dataUrl; });
  // Crop center square + downscale
  const size = 300;
  const min = Math.min(img.width, img.height);
  const sx = (img.width - min) / 2, sy = (img.height - min) / 2;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
  syncProfileInputs();
  modalState.photo = canvas.toDataURL('image/jpeg', 0.85);
  renderProfileModal();
}

function saveProfile() {
  syncProfileInputs();
  state.data.profile = {
    name: (modalState.name || '').trim() || 'Atleta',
    gender: modalState.gender || 'male',
    age: parseInt(modalState.age) || null,
    weight: parseInt(modalState.weight) || 80,
    belt: modalState.belt || 'Branca',
    degrees: parseInt(modalState.degrees) || 0,
    gym: (modalState.gym || '').trim(),
    startedAt: parseInt(modalState.startedAt) || new Date().getFullYear() - 1,
    photo: modalState.photo || null
  };
  persistUser();
  closeModal();
  showToast('Perfil atualizado!');
  render();
}

// =================== INIT ===================
initDelegation();
if (tryAutoLogin()) {
  state.currentTab = 'home';
}
render();
</script>
