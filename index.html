<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tatame · Performance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1a1a1a;
    --surface-3: #1f1f1f;
    --border: #222;
    --border-2: #2a2a2a;
    --text: #fff;
    --text-2: #888;
    --text-3: #555;
    --text-4: #666;
    --primary: #ff4444;
    --primary-dark: #cc3333;
    --green: #6ee06e;
    --green-bg: #1f3a1f;
    --red: #ff6b6b;
    --red-bg: #3a1f1f;
    --amber: #ffaa33;
    --amber-bg: #2a1f00;
    --blue: #4488ff;
    --purple: #aa66ff;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; font-size: 14px; overflow-x: hidden; }
  body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
  #app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--bg); position: relative; padding-bottom: 80px; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: 14px; background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text); border-radius: var(--radius-md); padding: 10px 12px; width: 100%; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); }
  .display-font { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }
  .screen { padding: 20px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; font-weight: 400; letter-spacing: 0.02em; }
  .header .label { font-size: 12px; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
  .avatar-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border-2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; overflow: hidden; padding: 0; }
  .avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
  .toggle { display: flex; gap: 6px; background: var(--surface); padding: 4px; border-radius: 24px; border: 1px solid var(--surface-3); margin-bottom: 16px; }
  .toggle button { flex: 1; background: transparent; color: var(--text-2); padding: 10px; border-radius: 20px; font-size: 12px; transition: all 0.15s; }
  .toggle button.active { background: var(--primary); color: #fff; font-weight: 500; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 12px; }
  .card-label { font-size: 11px; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; }
  .stat-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .stat-head i { font-size: 18px; }
  .stat-head .label { font-size: 10px; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; font-weight: 400; line-height: 1; letter-spacing: 0.02em; }
  .stat-sub { font-size: 10px; color: var(--text-4); margin-top: 4px; }
  .stat-sub.positive { color: var(--green); }
  .stat-sub.negative { color: var(--red); }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .btn-primary { width: 100%; background: var(--primary); color: #fff; padding: 14px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; transition: background 0.15s; }
  .btn-primary:active { background: var(--primary-dark); }
  .btn-secondary { width: 100%; background: transparent; color: var(--text); border: 1px solid var(--border-2); padding: 14px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; }
  .btn-dashed { width: 100%; background: transparent; color: var(--text-2); border: 1px dashed var(--border-2); padding: 10px; border-radius: var(--radius-md); font-size: 12px; }
  .input-row { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: var(--radius-md); padding: 10px 12px; margin-bottom: 8px; }
  .input-row label { display: block; font-size: 10px; color: var(--text-4); margin-bottom: 2px; }
  .input-row input, .input-row select { background: transparent; border: none; padding: 0; font-size: 14px; }
  .input-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .nav-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); z-index: 50; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-3); font-size: 10px; }
  .nav-item.active { color: var(--primary); }
  .nav-item i { font-size: 22px; }
  .progress-bar { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
  .belt-bar { display: flex; gap: 3px; }
  .belt-stripe { height: 6px; flex: 0 0 18px; border-radius: 1px; background: var(--border-2); }
  /* LOGIN */
  .auth-container { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 40px 28px; }
  .auth-logo { text-align: center; margin-bottom: 40px; }
  .auth-logo .mark { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--primary); letter-spacing: 0.04em; line-height: 1; }
  .auth-logo .tagline { font-size: 11px; color: var(--text-2); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .auth-form h2 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .auth-form .subtitle { font-size: 13px; color: var(--text-2); margin-bottom: 8px; }
  .auth-toggle { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-2); }
  .auth-toggle a { color: var(--primary); cursor: pointer; font-weight: 500; }
  .error-msg { background: var(--red-bg); color: var(--red); padding: 10px; border-radius: var(--radius-md); font-size: 12px; text-align: center; }
  /* CALENDAR */
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cal-month { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border-2); display: flex; align-items: center; justify-content: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow { text-align: center; font-size: 10px; color: var(--text-3); padding: 6px 0; letter-spacing: 1px; }
  .cal-day { aspect-ratio: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 12px; color: var(--text-2); position: relative; cursor: pointer; transition: all 0.15s; }
  .cal-day.today { border-color: var(--primary); color: var(--text); }
  .cal-day.has-session { background: var(--surface-2); color: var(--text); }
  .cal-day.has-session::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }
  .cal-day.has-comp::after { background: var(--amber); }
  .cal-day.empty { background: transparent; border: none; cursor: default; }
  .cal-day.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
  .cal-day.future { opacity: 0.3; cursor: default; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: flex-end; justify-content: center; z-index: 100; animation: fadeOverlay 0.2s; }
  @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
  .modal { width: 100%; max-width: 480px; max-height: 90vh; background: var(--surface); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(20%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-size: 18px; font-weight: 500; }
  .close-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; }
  /* Submission card */
  .sub-card { background: var(--surface-2); padding: 12px; border-radius: var(--radius-md); margin-bottom: 8px; }
  .sub-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .sub-card-head .num { font-size: 11px; color: var(--text-2); letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .sub-card-head .num::before { content: ''; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
  .sub-card-head.sofrida .num::before { background: var(--blue); }
  /* Counter */
  .counter { display: flex; align-items: center; gap: 12px; }
  .counter button { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; }
  .counter .minus { background: var(--surface-2); border: 1px solid var(--border-2); color: var(--text); }
  .counter .plus { background: var(--primary); color: #fff; }
  .counter .value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; min-width: 50px; text-align: center; }
  /* Partner item */
  .partner-item { display: flex; align-items: center; gap: 10px; background: var(--surface-2); padding: 10px 12px; border-radius: var(--radius-md); margin-bottom: 8px; }
  .partner-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--border-2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .partner-info { flex: 1; min-width: 0; }
  .partner-info .name { font-size: 13px; line-height: 1.2; }
  .partner-info .meta { font-size: 11px; color: var(--text-4); margin-top: 1px; }
  /* List item */
  .list-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 8px; cursor: pointer; }
  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-3); }
  .empty i { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty p { font-size: 13px; }
  /* Belt colors */
  .belt-branca { background: #fff; }
  .belt-azul { background: #4488ff; }
  .belt-roxa { background: #6644aa; }
  .belt-marrom { background: #8b4513; }
  .belt-preta { background: #000; border: 1px solid #444; }
  /* Result colors for comp matches */
  .match-win { border-left: 3px solid var(--green); }
  .match-loss { border-left: 3px solid var(--red); }
  .match-bg { background: var(--surface-2); padding: 12px; border-radius: var(--radius-md); margin-bottom: 8px; }
  .insight-card { background: linear-gradient(135deg, rgba(255,68,68,0.08), var(--surface)); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .day-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
  .day-header .back { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; }
  .session-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
  .session-summary > div { background: var(--surface-2); padding: 10px; border-radius: var(--radius-md); text-align: center; }
  .session-summary .val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
  .session-summary .lbl { font-size: 9px; color: var(--text-2); letter-spacing: 1px; text-transform: uppercase; }
  /* Toast */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--green); color: var(--green); padding: 12px 20px; border-radius: var(--radius-md); font-size: 13px; z-index: 200; animation: toastIn 0.3s ease; }
  .toast.toast-error { border-color: var(--red); color: var(--red); }
  /* Recap (Wrapped) */
  .recap-overlay { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; background: #000; }
  .recap-slide { width: 100%; max-width: 480px; height: 100vh; max-height: 100vh; padding: 40px 24px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; cursor: pointer; user-select: none; }
  .recap-slide::before { content: ''; position: absolute; inset: 0; background: inherit; z-index: -1; }
  .recap-progress { position: absolute; top: 12px; left: 16px; right: 16px; display: flex; gap: 4px; z-index: 10; }
  .recap-progress-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.25); border-radius: 2px; overflow: hidden; }
  .recap-progress-bar.done { background: rgba(255,255,255,1); }
  .recap-progress-bar.active::after { content: ''; display: block; height: 100%; background: #fff; animation: progressFill 4s linear forwards; }
  @keyframes progressFill { from { width: 0%; } to { width: 100%; } }
  .recap-close { position: absolute; top: 24px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; color: #fff; z-index: 11; }
  .recap-nav-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 9; }
  .recap-nav-prev { left: 0; }
  .recap-nav-next { right: 0; }
  .recap-content { animation: recapSlideIn 0.4s ease; text-align: center; color: #fff; }
  @keyframes recapSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .recap-emoji { font-size: 80px; margin-bottom: 16px; line-height: 1; }
  .recap-label { font-size: 13px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; opacity: 0.85; margin-bottom: 16px; }
  .recap-big { font-family: 'Bebas Neue', sans-serif; font-size: 96px; line-height: 0.9; letter-spacing: 0.02em; margin-bottom: 8px; }
  .recap-big-sub { font-size: 18px; font-weight: 500; opacity: 0.9; margin-bottom: 16px; }
  .recap-headline { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; letter-spacing: 0.02em; margin-bottom: 12px; }
  .recap-body { font-size: 16px; line-height: 1.5; opacity: 0.9; max-width: 320px; margin: 0 auto; }
  .recap-share-btn { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.3); z-index: 11; }
  .recap-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
  /* Recap card on home */
  .recap-cta { background: linear-gradient(135deg, #ff4444, #ff8833); border: none; border-radius: var(--radius-lg); padding: 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; color: #fff; cursor: pointer; width: 100%; text-align: left; box-shadow: 0 4px 20px rgba(255,68,68,0.3); }
  .recap-cta .ico { font-size: 32px; }
  .recap-cta .info { flex: 1; }
  .recap-cta .ttl { font-size: 14px; font-weight: 600; }
  .recap-cta .sub { font-size: 11px; opacity: 0.9; margin-top: 2px; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .ranking-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
  .ranking-row .name { font-size: 13px; }
  .ranking-row .count { font-size: 12px; color: var(--text-2); }
  .progress-track { height: 8px; background: var(--surface-2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
  .progress-track .fill { height: 100%; background: var(--primary); border-radius: 4px; }
  .combo-row { display: flex; align-items: center; gap: 8px; background: var(--surface-2); padding: 10px 12px; border-radius: var(--radius-md); margin-bottom: 8px; }
  .combo-tag { padding: 3px 8px; border-radius: 8px; font-size: 10px; }
  .combo-tag.pos { background: var(--border-2); color: var(--text-2); }
  .combo-tag.fin { background: var(--red-bg); color: var(--red); }
  .combo-row .count { margin-left: auto; font-size: 13px; font-weight: 500; }
  .week-grid { display: flex; gap: 6px; margin-top: 14px; }
  .week-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .week-day .box { width: 100%; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; border: none; }
  .week-day .box.done { background: var(--green); }
  .week-day .box.planned { background: rgba(255,68,68,0.15); border: 2px solid var(--primary); }
  .week-day .box.empty-day { background: var(--surface-2); border: 1px dashed var(--border-2); }
  .week-day .box.today-ring { box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
  .week-day .lbl { font-size: 9px; color: var(--text-3); text-transform: uppercase; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// =================== DATA & STATE ===================
const STORAGE_KEY = 'jjtracker_v1';

// Belts (adult)
const BELTS_ADULT = ['Branca', 'Azul', 'Roxa', 'Marrom', 'Preta'];

// Belts (kids - IBJJF complete with gradations) - applies if age < 16
const BELTS_KIDS = [
  'Branca',
  'Cinza/Branca', 'Cinza', 'Cinza/Preta',
  'Amarela/Branca', 'Amarela', 'Amarela/Preta',
  'Laranja/Branca', 'Laranja', 'Laranja/Preta',
  'Verde/Branca', 'Verde', 'Verde/Preta'
];

function getBelts(age) {
  return (age && age < 16) ? BELTS_KIDS : BELTS_ADULT;
}

// Belt colors for visual rendering
function getBeltVisual(beltName) {
  const b = (beltName || '').toLowerCase();
  if (b.includes('branca') && !b.includes('/')) return { bg: '#ffffff', stripe: null, border: '#444' };
  if (b === 'azul') return { bg: '#4488ff', stripe: null };
  if (b === 'roxa') return { bg: '#6644aa', stripe: null };
  if (b === 'marrom') return { bg: '#8b4513', stripe: null };
  if (b === 'preta') return { bg: '#000', stripe: null, border: '#444' };
  // Kids
  if (b === 'cinza/branca') return { bg: '#888', stripe: '#fff' };
  if (b === 'cinza') return { bg: '#888', stripe: null };
  if (b === 'cinza/preta') return { bg: '#888', stripe: '#000' };
  if (b === 'amarela/branca') return { bg: '#f5d800', stripe: '#fff' };
  if (b === 'amarela') return { bg: '#f5d800', stripe: null };
  if (b === 'amarela/preta') return { bg: '#f5d800', stripe: '#000' };
  if (b === 'laranja/branca') return { bg: '#ff7a00', stripe: '#fff' };
  if (b === 'laranja') return { bg: '#ff7a00', stripe: null };
  if (b === 'laranja/preta') return { bg: '#ff7a00', stripe: '#000' };
  if (b === 'verde/branca') return { bg: '#2e9e44', stripe: '#fff' };
  if (b === 'verde') return { bg: '#2e9e44', stripe: null };
  if (b === 'verde/preta') return { bg: '#2e9e44', stripe: '#000' };
  return { bg: '#fff', stripe: null, border: '#444' };
}

const WEIGHT_CLASSES_GI_MALE = [
  { name: 'Galo', limit: 57.5 },
  { name: 'Pluma', limit: 64.0 },
  { name: 'Pena', limit: 70.0 },
  { name: 'Leve', limit: 76.0 },
  { name: 'Médio', limit: 82.3 },
  { name: 'Meio-pesado', limit: 88.3 },
  { name: 'Pesado', limit: 94.3 },
  { name: 'Super-pesado', limit: 100.5 },
  { name: 'Pesadíssimo', limit: 999 }
];

const WEIGHT_CLASSES_GI_FEMALE = [
  { name: 'Galo', limit: 48.5 },
  { name: 'Pluma', limit: 53.5 },
  { name: 'Pena', limit: 58.5 },
  { name: 'Leve', limit: 64.0 },
  { name: 'Médio', limit: 69.0 },
  { name: 'Meio-pesado', limit: 74.0 },
  { name: 'Pesado', limit: 79.3 },
  { name: 'Pesadíssimo', limit: 999 }
];

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { users: {}, currentEmail: null };
  } catch { return { users: {}, currentEmail: null }; }
}
function saveAll(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

// Simple password hash (NOT cryptographically secure - for local-only demo)
async function hashPassword(pw) {
  const enc = new TextEncoder().encode(pw + ':tatame-salt-2026');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// =================== AUTH ===================
async function tryLogin(email, password) {
  const db = loadAll();
  const u = db.users[email];
  if (!u) return { error: 'Conta não encontrada' };
  const hash = await hashPassword(password);
  if (u.passwordHash !== hash) return { error: 'Senha incorreta' };
  db.currentEmail = email;
  saveAll(db);
  state.currentUser = email;
  state.data = u.data;
  migrate(state.data);
  return { ok: true };
}

async function tryRegister(email, password, name) {
  if (!email.includes('@')) return { error: 'Email inválido' };
  if (password.length < 6) return { error: 'Senha deve ter 6+ caracteres' };
  const db = loadAll();
  if (db.users[email]) return { error: 'Email já cadastrado' };
  const hash = await hashPassword(password);
  const data = newUserData();
  data.profile.name = name || email.split('@')[0];
  db.users[email] = { passwordHash: hash, data };
  db.currentEmail = email;
  saveAll(db);
  state.currentUser = email;
  state.data = data;
  return { ok: true };
}

function logout() {
  const db = loadAll();
  db.currentEmail = null;
  saveAll(db);
  state.currentUser = null;
  state.data = null;
  render();
}

function persistUser() {
  if (!state.currentUser) return;
  const db = loadAll();
  if (db.users[state.currentUser]) {
    db.users[state.currentUser].data = state.data;
    saveAll(db);
  }
}

function migrate(data) {
  if (!data.weekPlans) data.weekPlans = {};
  if (data.profile.weeklyGoal !== undefined) delete data.profile.weeklyGoal;
  if (data.profile.age === undefined) data.profile.age = null;
  if (data.profile.photo === undefined) data.profile.photo = null;
  if (!data.recapsDismissed) data.recapsDismissed = {}; // { "2026-04": true }
  // Migrate weekPlans: old array format → new {gi, 'no-gi'} format
  for (const k in data.weekPlans) {
    if (Array.isArray(data.weekPlans[k])) {
      data.weekPlans[k] = { gi: data.weekPlans[k].slice(), 'no-gi': [false,false,false,false,false,false,false] };
    }
  }
  data.sessions.forEach(s => {
    if (!s.rollDetails) s.rollDetails = null;
    if (s.mood === undefined) s.mood = null;
  });
}

function tryAutoLogin() {
  const db = loadAll();
  if (db.currentEmail && db.users[db.currentEmail]) {
    state.currentUser = db.currentEmail;
    state.data = db.users[db.currentEmail].data;
    migrate(state.data);
    return true;
  }
  return false;
}

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function parseLocalISO(iso) {
  // "2026-05-11" → new Date(2026, 4, 11) - local midnight, no UTC shift
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(iso) {
  return parseLocalISO(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}
function fmtDateLong(iso) {
  return parseLocalISO(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}
function todayISO() { return localISO(new Date()); }
function localISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(s => s[0]).slice(0,2).join('').toUpperCase();
}

function getSessionsForMode() { return state.data.sessions.filter(s => s.mode === state.mode); }
function getCompsForMode() { return state.data.comps.filter(c => c.mode === state.mode); }

function getMonthStats(year, month) {
  const sessions = getSessionsForMode().filter(s => {
    const d = parseLocalISO(s.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
  let rolls = 0, applied = 0, suffered = 0, minutes = 0;
  sessions.forEach(s => {
    rolls += s.rolls || 0;
    applied += (s.applied || []).length;
    suffered += (s.suffered || []).length;
    minutes += s.duration || 0;
  });
  return { sessionsCount: sessions.length, rolls, applied, suffered, hours: Math.round(minutes/60*10)/10 };
}

function getWeekKey(date) {
  // ISO week key: YYYY-Www
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = d.valueOf();
  d.setUTCMonth(0, 1);
  if (d.getUTCDay() !== 4) {
    d.setUTCMonth(0, 1 + ((4 - d.getUTCDay()) + 7) % 7);
  }
  const weekNum = 1 + Math.ceil((firstThursday - d) / 604800000);
  return `${date.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

function getCurrentWeekProgress() {
  const now = new Date();
  const day = now.getDay();
  const offset = day === 0 ? 6 : day - 1;
  const monday = new Date(now); monday.setDate(now.getDate() - offset); monday.setHours(0,0,0,0);
  const days = [];
  for (let i=0; i<7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    days.push(d);
  }
  const sessions = state.data.sessions.filter(s => s.mode === state.mode);
  const sessionsByDay = days.map(d => {
    const iso = localISO(d);
    return sessions.some(s => s.date === iso);
  });
  const weekKey = getWeekKey(now);
  if (!state.data.weekPlans) state.data.weekPlans = {};
  if (!state.data.weekPlans[weekKey]) state.data.weekPlans[weekKey] = { gi: [false,false,false,false,false,false,false], 'no-gi': [false,false,false,false,false,false,false] };
  if (Array.isArray(state.data.weekPlans[weekKey])) {
    state.data.weekPlans[weekKey] = { gi: state.data.weekPlans[weekKey].slice(), 'no-gi': [false,false,false,false,false,false,false] };
  }
  const plan = state.data.weekPlans[weekKey][state.mode];
  // Total marked = days that are either planned OR trained (union)
  const markedDays = plan.map((p, i) => p || sessionsByDay[i]);
  const goal = markedDays.filter(Boolean).length;
  const done = sessionsByDay.filter(Boolean).length;
  return { days, sessionsByDay, plan, weekKey, done, goal, now };
}

function computeStats(periodDays = 90) {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - periodDays);
  const sessions = getSessionsForMode().filter(s => parseLocalISO(s.date) >= cutoff);
  const positionCount = {}, subCount = {}, comboCount = {}, sufferedCombos = {};
  let totalApplied = 0, totalSuffered = 0;
  sessions.forEach(s => {
    (s.applied || []).forEach(a => {
      totalApplied++;
      if (a.position) positionCount[a.position] = (positionCount[a.position] || 0) + 1;
      if (a.submission) subCount[a.submission] = (subCount[a.submission] || 0) + 1;
      if (a.position && a.submission) {
        const k = `${a.position} → ${a.submission}`;
        comboCount[k] = (comboCount[k] || 0) + 1;
      }
    });
    (s.suffered || []).forEach(x => {
      totalSuffered++;
      if (x.position && x.submission) {
        const k = `${x.position} → ${x.submission}`;
        sufferedCombos[k] = (sufferedCombos[k] || 0) + 1;
      }
    });
  });
  function topN(obj, n=5) {
    return Object.entries(obj).sort((a,b) => b[1] - a[1]).slice(0, n);
  }
  return { totalApplied, totalSuffered, positions: topN(positionCount), subs: topN(subCount), combos: topN(comboCount, 5), suffered: topN(sufferedCombos, 5) };
}

function computeMonthlyRecap(year, month) {
  // Considera ambos modos (Gi + No-Gi) - retrospectiva é do atleta no mês inteiro
  const allSessions = state.data.sessions.filter(s => {
    const d = parseLocalISO(s.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
  const allComps = state.data.comps.filter(c => {
    const d = parseLocalISO(c.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });

  // Mês anterior para comparações
  const prevMonth = month === 0 ? 11 : month - 1;
  const prevYear = month === 0 ? year - 1 : year;
  const prevSessions = state.data.sessions.filter(s => {
    const d = parseLocalISO(s.date);
    return d.getFullYear() === prevYear && d.getMonth() === prevMonth;
  });

  let rolls = 0, applied = 0, suffered = 0, minutes = 0;
  const positionCount = {}, subCount = {}, comboCount = {}, sufferedCombos = {}, partnerCount = {};
  const moodValues = [];
  const trainingDays = new Set();
  const giCount = { gi: 0, 'no-gi': 0 };

  allSessions.forEach(s => {
    rolls += s.rolls || 0;
    applied += (s.applied || []).length;
    suffered += (s.suffered || []).length;
    minutes += s.duration || 0;
    trainingDays.add(s.date);
    giCount[s.mode] = (giCount[s.mode] || 0) + 1;
    if (s.mood != null) moodValues.push(s.mood);
    (s.applied || []).forEach(a => {
      if (a.position) positionCount[a.position] = (positionCount[a.position] || 0) + 1;
      if (a.submission) subCount[a.submission] = (subCount[a.submission] || 0) + 1;
      if (a.position && a.submission) {
        const k = `${a.position} → ${a.submission}`;
        comboCount[k] = (comboCount[k] || 0) + 1;
      }
    });
    (s.suffered || []).forEach(x => {
      if (x.position && x.submission) {
        const k = `${x.position} → ${x.submission}`;
        sufferedCombos[k] = (sufferedCombos[k] || 0) + 1;
      }
    });
    (s.partners || []).forEach(pid => {
      partnerCount[pid] = (partnerCount[pid] || 0) + 1;
    });
  });

  let prevRolls = 0, prevMinutes = 0, prevApplied = 0;
  prevSessions.forEach(s => {
    prevRolls += s.rolls || 0;
    prevMinutes += s.duration || 0;
    prevApplied += (s.applied || []).length;
  });

  const topByCount = (obj) => {
    const sorted = Object.entries(obj).sort((a,b) => b[1] - a[1]);
    return sorted[0] || null;
  };
  const topPosition = topByCount(positionCount);
  const topSub = topByCount(subCount);
  const topCombo = topByCount(comboCount);
  const topVulnerability = topByCount(sufferedCombos);
  const topPartnerEntry = topByCount(partnerCount);
  const topPartner = topPartnerEntry ? state.data.partners.find(p => p.id === topPartnerEntry[0]) : null;

  const avgMood = moodValues.length ? (moodValues.reduce((a,b) => a+b, 0) / moodValues.length) : null;

  // Streak: max consecutive days with training
  const sortedDays = Array.from(trainingDays).sort();
  let maxStreak = 0, currentStreak = 0, lastDate = null;
  for (const isoDate of sortedDays) {
    const d = parseLocalISO(isoDate);
    if (lastDate && (d - lastDate) === 86400000) {
      currentStreak++;
    } else {
      currentStreak = 1;
    }
    maxStreak = Math.max(maxStreak, currentStreak);
    lastDate = d;
  }

  const monthName = new Date(year, month, 1).toLocaleDateString('pt-BR', { month: 'long' });
  const totalAppliedPlusSuffered = applied + suffered;

  return {
    year, month, monthName,
    sessions: allSessions.length,
    comps: allComps.length,
    rolls, applied, suffered, minutes,
    hours: Math.round(minutes/60*10)/10,
    trainingDays: trainingDays.size,
    giCount: giCount.gi, nogiCount: giCount['no-gi'],
    avgMood,
    moodCount: moodValues.length,
    topPosition, topSub, topCombo, topVulnerability, topPartner,
    partnerCount: Object.keys(partnerCount).length,
    maxStreak,
    submissionRate: totalAppliedPlusSuffered > 0 ? Math.round(applied / totalAppliedPlusSuffered * 100) : 0,
    // Comparisons with previous month
    prev: { rolls: prevRolls, hours: Math.round(prevMinutes/60*10)/10, applied: prevApplied, sessions: prevSessions.length },
    hasData: allSessions.length > 0,
  };
}

function getAvailableRecaps() {
  // Returns list of {year, month} pairs that have at least 1 session and are in the past (fully completed months)
  const today = new Date();
  today.setDate(1); today.setHours(0,0,0,0);
  const months = new Set();
  state.data.sessions.forEach(s => {
    const d = parseLocalISO(s.date);
    if (d < today) {
      months.add(`${d.getFullYear()}-${d.getMonth()}`);
    }
  });
  return Array.from(months).map(k => {
    const [y, m] = k.split('-').map(Number);
    return { year: y, month: m };
  }).sort((a, b) => (b.year - a.year) || (b.month - a.month));
}

function getCurrentUnseenRecap() {
  // Returns the latest unseen recap key, or null
  const recaps = getAvailableRecaps();
  for (const r of recaps) {
    const key = `${r.year}-${String(r.month + 1).padStart(2, '0')}`;
    if (!state.data.recapsDismissed || !state.data.recapsDismissed[key]) {
      return r;
    }
  }
  return null;
}

  if (!state.currentUser) { root.innerHTML = renderAuth(); attachAuthListeners(); return; }
  let content = '';
  switch (state.currentTab) {
    case 'home': content = renderHome(); break;
    case 'calendar': content = renderCalendar(); break;
    case 'day': content = renderDay(); break;
    case 'stats': content = renderStats(); break;
    case 'comps': content = renderComps(); break;
    case 'partners': content = renderPartners(); break;
    case 'profile': content = renderProfile(); break;
    default: content = renderHome();
  }
  root.innerHTML = content + renderNav();
  attachListeners();
}

  document.getElementById('auth-submit').onclick = async () => {
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    const pw = document.getElementById('auth-pw').value;
    if (!email || !pw) { authError = 'Preencha email e senha'; render(); return; }
    let res;
    if (authMode === 'login') {
      res = await tryLogin(email, pw);
    } else {
      const name = document.getElementById('auth-name').value.trim();
      res = await tryRegister(email, pw, name);
    }
    if (res.error) { authError = res.error; render(); }
    else { authError = ''; state.currentTab = 'home'; render(); }
  };
  // Enter key submit
  ['auth-email','auth-pw','auth-name'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-submit').click(); });
  });
}

// ---------- HOME ----------
function renderHome() {
  const p = state.data.profile;
  const month = getMonthStats(state.cal.year, state.cal.month);
  const week = getCurrentWeekProgress();
  const stats = computeStats(30);

  const weekDaysHtml = week.days.map((d, i) => {
    const isToday = d.toDateString() === new Date().toDateString();
    const trained = week.sessionsByDay[i];
    const planned = week.plan[i];
    let cls, inner;
    if (trained) {
      cls = 'done';
      inner = '<i class="ti ti-check" style="color:#0a0a0a;font-size:14px"></i>';
    } else if (planned) {
      cls = 'planned';
      inner = '';
    } else {
      cls = 'empty-day';
      inner = '';
    }
    if (isToday && !trained) cls += ' today-ring';
    const lbl = ['SEG','TER','QUA','QUI','SEX','SAB','DOM'][i];
    const displayLbl = isToday ? 'HOJE' : lbl;
    return `<div class="week-day">
      <button class="box ${cls}" data-action="toggle-plan:${i}" title="${planned ? 'Planejado' : 'Clique para planejar'}">${inner}</button>
      <div class="lbl" style="${isToday ? 'color:var(--text);font-weight:600' : ''}">${displayLbl}</div>

  const topSubsHtml = stats.subs.length ? stats.subs.map(([name, count]) => {

        <span>${escapeHtml(name)}</span>

      </div>
      ${headerAvatar()}
    </div>

    <div class="toggle">
      <button class="${state.mode === 'gi' ? 'active' : ''}" data-action="mode:gi"><i class="ti ti-shirt" style="font-size:13px;vertical-align:-2px"></i> Gi</button>
      <button class="${state.mode === 'no-gi' ? 'active' : ''}" data-action="mode:no-gi">No-Gi</button>
    </div>

    ${(() => {
      const unseen = getCurrentUnseenRecap();
      if (!unseen) return '';
      const recap = computeMonthlyRecap(unseen.year, unseen.month);
      if (!recap.hasData) return '';
      const monthCap = recap.monthName.charAt(0).toUpperCase() + recap.monthName.slice(1);
      return `<button class="recap-cta" data-action="recap-open:${unseen.year}-${unseen.month}">
        <div class="ico">🎁</div>

          <div class="ttl">Sua retrospectiva de ${monthCap} chegou!</div>
          <div class="sub">${recap.sessions} treinos · ${recap.hours}h no tatame · Toque pra ver</div>
        </div>
        <i class="ti ti-chevron-right" style="font-size:20px"></i>
      </button>`;
    })()}

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <div class="card-label">Frequência semanal · ${state.mode === 'gi' ? 'Gi' : 'No-Gi'}</div>
          ${week.goal > 0 ? `
            <div style="font-family:'Bebas Neue';font-size:36px;line-height:1">${week.done}<span style="font-size:18px;color:var(--text-4)">/${week.goal}</span></div>
            <div style="font-size:11px;color:${week.done >= week.goal ? 'var(--green)' : 'var(--text-2)'};margin-top:4px">${
              week.done >= week.goal
                ? (week.done > week.goal ? `Meta cumprida +${week.done - week.goal} bônus!` : 'Meta semanal cumprida!')
                : `Faltam ${week.goal - week.done} ${week.goal - week.done === 1 ? 'treino' : 'treinos'}`
            }</div>
          ` : `
            <div style="font-family:'Bebas Neue';font-size:28px;line-height:1;color:var(--text-2)">Sem plano</div>
            <div style="font-size:11px;color:var(--text-3);margin-top:4px">Toque nos dias abaixo pra planejar</div>
          `}
        </div>
        ${week.goal > 0 ? `<span class="pill ${week.done >= week.goal ? 'pill-green' : 'pill-amber'}">${Math.round(week.done/week.goal*100)}%</span>` : ''}
      </div>
      <div class="week-grid">${weekDaysHtml}</div>
      <p style="font-size:10px;color:var(--text-3);margin-top:10px;text-align:center">Plano de ${state.mode === 'gi' ? 'Gi' : 'No-Gi'} · troque o modo no topo pra ver o outro</p>

    <div class="stat-grid">

        <div class="stat-head"><i class="ti ti-flame" style="color:var(--primary)"></i><span class="label">Rolas</span></div>

        <div class="stat-sub">este mês</div>
      </div>
      <div class="stat">

        <div class="stat-value">${month.applied}</div>
        <div class="stat-sub">este mês</div>
      </div>
      <div class="stat">
        <div class="stat-head"><i class="ti ti-shield" style="color:var(--blue)"></i><span class="label">Sofridas</span></div>
        <div class="stat-value">${month.suffered}</div>
        <div class="stat-sub">este mês</div>
      </div>
      <div class="stat">
        <div class="stat-head"><i class="ti ti-clock" style="color:var(--purple)"></i><span class="label">Tatame</span></div>
        <div class="stat-value">${month.hours}<span style="font-size:16px;color:var(--text-4)">h</span></div>
        <div class="stat-sub">este mês</div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:500">Composição do meu jogo</div>
        <span style="font-size:10px;color:var(--text-4)">${state.mode === 'gi' ? 'Gi' : 'No-Gi'} · 30 dias</span>
      </div>
      ${stats.totalApplied > 0 ? `<div style="font-size:11px;color:var(--text-2);margin-bottom:12px">Das suas <span style="color:var(--text)">${stats.totalApplied} finalizações</span>:</div>` : ''}
      ${topSubsHtml}

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-primary" data-action="open:new-session"><i class="ti ti-plus" style="vertical-align:-2px"></i> Novo treino</button>
      <button class="btn-secondary" data-action="open:new-comp"><i class="ti ti-trophy" style="vertical-align:-2px"></i> Competição</button>
    </div>
    <p style="text-align:center;font-size:9px;color:var(--text-3);margin-top:18px;letter-spacing:1px">TATAME · build v12</p>
  </div>`;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Bom dia';
  if (h < 18) return 'Boa tarde';
  return 'Boa noite';
}

// ---------- CALENDAR ----------
function renderCalendar() {
  const { year, month } = state.cal;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startOffset = (firstDay.getDay() + 6) % 7; // Monday first
  const sessions = getSessionsForMode();
  const compsList = getCompsForMode();
  const sessionDates = new Set(sessions.map(s => s.date));
  const compDates = new Set(compsList.map(c => c.date));
  const today = new Date(); today.setHours(0,0,0,0);

  let cells = '';
  for (let i = 0; i < startOffset; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const iso = localISO(date);
    const isToday = date.getTime() === today.getTime();
    const isFuture = date > today;
    const hasSession = sessionDates.has(iso);
    const hasComp = compDates.has(iso);
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (hasSession) cls += ' has-session';
    if (hasComp) cls += ' has-comp';
    if (isFuture && !hasSession && !hasComp) cls += ' future';
    cells += `<div class="${cls}" data-action="select-day:${iso}">${d}</div>`;
  }

  const monthName = firstDay.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

  return `
  <div class="screen">
    <div class="header">
      <h1>Histórico</h1>
      ${headerAvatar()}
    </div>

    <div class="toggle">
      <button class="${state.mode === 'gi' ? 'active' : ''}" data-action="mode:gi"><i class="ti ti-shirt" style="font-size:13px;vertical-align:-2px"></i> Gi</button>
      <button class="${state.mode === 'no-gi' ? 'active' : ''}" data-action="mode:no-gi">No-Gi</button>
    </div>

    <div class="cal-header">
      <div class="cal-month" style="text-transform:capitalize">${monthName}</div>
      <div class="cal-nav">
        <button data-action="cal:prev"><i class="ti ti-chevron-left"></i></button>
        <button data-action="cal:next"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>

    <div class="cal-grid" style="margin-bottom:8px">
      <div class="cal-dow">SEG</div>
      <div class="cal-dow">TER</div>
      <div class="cal-dow">QUA</div>
      <div class="cal-dow">QUI</div>
      <div class="cal-dow">SEX</div>
      <div class="cal-dow">SÁB</div>
      <div class="cal-dow">DOM</div>
    </div>
    <div class="cal-grid">${cells}</div>

    <div style="display:flex;gap:14px;justify-content:center;margin:18px 0;font-size:11px;color:var(--text-2)">
      <span><span style="display:inline-block;width:6px;height:6px;background:var(--primary);border-radius:50%;vertical-align:1px;margin-right:6px"></span>Treino</span>
      <span><span style="display:inline-block;width:6px;height:6px;background:var(--amber);border-radius:50%;vertical-align:1px;margin-right:6px"></span>Competição</span>
    </div>

    <div class="card">
      <div class="card-label">Resumo do mês</div>
      ${(() => {
        const m = getMonthStats(year, month);
        return `<div class="session-summary">
          <div><div class="val">${m.sessionsCount}</div><div class="lbl">Treinos</div></div>
          <div><div class="val">${m.rolls}</div><div class="lbl">Rolas</div></div>
          <div><div class="val">${m.applied}</div><div class="lbl">Finalizações</div></div>
        </div>`;
      })()}
    </div>
  </div>`;
}

// ---------- DAY DETAIL ----------
function renderDay() {
  const date = state.selectedDate;
  const sessions = getSessionsForMode().filter(s => s.date === date);
  const comps = getCompsForMode().filter(c => c.date === date);

  let body = '';
  if (sessions.length === 0 && comps.length === 0) {
    body = `<div class="empty"><i class="ti ti-calendar-off"></i><p>Sem atividades neste dia</p></div>`;
  } else {
    sessions.forEach(s => {
      body += renderSessionCard(s);
    });
    comps.forEach(c => {
      body += renderCompCard(c);
    });
  }

  const isFutureDate = date > todayISO();
  return `
  <div class="screen">
    <div class="day-header">
      <button class="back" data-action="goto:calendar"><i class="ti ti-arrow-left" style="font-size:18px"></i></button>
      <h2 style="text-transform:capitalize">${fmtDateLong(date)}</h2>
      <div style="width:32px"></div>
    </div>
    ${body}
    ${isFutureDate
      ? `<div class="empty" style="padding:20px;margin-top:16px"><i class="ti ti-lock"></i><p>Datas futuras não podem ter treinos registrados</p></div>`
      : `<button class="btn-primary" style="margin-top:16px" data-action="open:new-session-date:${date}"><i class="ti ti-plus" style="vertical-align:-2px"></i> Adicionar treino neste dia</button>`}
  </div>`;
}

function renderSessionCard(s) {
  const partnersById = Object.fromEntries(state.data.partners.map(p => [p.id, p]));

  // Partners list (visible badges)
  const partnersList = (s.partners || []).map(pid => partnersById[pid]).filter(Boolean);
  const partnersHtml = partnersList.length ? `
    <div style="margin-top:12px">
      <div style="font-size:11px;color:var(--text-2);margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase"><i class="ti ti-users" style="vertical-align:-2px;font-size:13px"></i> Parceiros desta sessão</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${partnersList.map(p => {
          const v = getBeltVisual(p.belt);
          return `<div style="display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);padding:5px 10px 5px 5px;border-radius:14px">
            <div style="width:22px;height:22px;border-radius:50%;background:${v.bg};${v.border ? `border:1px solid ${v.border};` : ''}display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:${v.bg === '#fff' || v.bg === '#f5d800' ? '#000' : '#fff'}">${initials(p.name)}</div>
            <span style="font-size:11px">${escapeHtml(p.name.split(' ')[0])}</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // Per-roll breakdown if available
  let rollDetailHtml = '';
  if (s.rollDetails && s.rollDetails.length) {
    rollDetailHtml = `<div style="margin-top:14px">
      <div style="font-size:11px;color:var(--text-2);margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase">Por rola</div>
      ${s.rollDetails.map((r, ri) => {
        const partner = r.partnerId ? partnersById[r.partnerId] : null;
        const appliedC = (r.applied || []).filter(a => a.position && a.submission);
        const sufferedC = (r.suffered || []).filter(x => x.position && x.submission);
        return `<div style="background:var(--surface-2);padding:10px 12px;border-radius:var(--radius-md);margin-bottom:6px;border-left:2px solid var(--border-2)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${appliedC.length || sufferedC.length || r.notes ? '6px' : '0'}">
            <div style="font-size:12px;font-weight:500">Rola ${ri+1}${partner ? ` · ${escapeHtml(partner.name.split(' ')[0])}` : ''}</div>
            <div style="font-size:10px;color:var(--text-3)">${appliedC.length ? `<span style="color:var(--green)">${appliedC.length} aplic</span>` : ''}${appliedC.length && sufferedC.length ? ' · ' : ''}${sufferedC.length ? `<span style="color:var(--red)">${sufferedC.length} sofr</span>` : ''}</div>
          </div>
          ${appliedC.map(a => `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-top:4px"><span style="width:5px;height:5px;background:var(--green);border-radius:50%"></span><span style="color:var(--text-2)">${escapeHtml(a.position)}</span><i class="ti ti-arrow-right" style="font-size:10px;color:var(--text-4)"></i><span>${escapeHtml(a.submission)}</span></div>`).join('')}
          ${sufferedC.map(x => `<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-top:4px"><span style="width:5px;height:5px;background:var(--red);border-radius:50%"></span><span style="color:var(--text-2)">${escapeHtml(x.position)}</span><i class="ti ti-arrow-right" style="font-size:10px;color:var(--text-4)"></i><span style="color:var(--red)">${escapeHtml(x.submission)}</span></div>`).join('')}
          ${r.notes ? `<div style="margin-top:6px;font-size:11px;color:var(--text-3);font-style:italic">"${escapeHtml(r.notes)}"</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;

    // Legacy: flat applied/suffered
    rollDetailHtml = `
      ${(s.applied || []).length ? `<div style="font-size:11px;color:var(--text-2);margin-top:8px;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase">Finalizações aplicadas</div>` : ''}
      ${(s.applied || []).map(a => `<div class="combo-row">
        <span class="combo-tag pos">${escapeHtml(a.position)}</span>
        <i class="ti ti-arrow-right" style="font-size:12px;color:var(--text-4)"></i>
        <span class="combo-tag fin">${escapeHtml(a.submission)}</span>
        ${a.partnerId && partnersById[a.partnerId] ? `<span style="margin-left:auto;font-size:11px;color:var(--text-4)">${escapeHtml(partnersById[a.partnerId].name.split(' ')[0])}</span>` : ''}
      </div>`).join('')}
      ${(s.suffered || []).length ? `<div style="font-size:11px;color:var(--text-2);margin-top:10px;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase">Finalizações sofridas</div>` : ''}
      ${(s.suffered || []).map(x => `<div class="combo-row" style="background:var(--surface-2);border-left:3px solid var(--blue)">
        <span class="combo-tag pos">${escapeHtml(x.position)}</span>
        <i class="ti ti-arrow-right" style="font-size:12px;color:var(--text-4)"></i>
        <span class="combo-tag" style="background:rgba(68,136,255,0.15);color:var(--blue)">${escapeHtml(x.submission)}</span>
      </div>`).join('')}`;
  }

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <i class="ti ti-flame" style="color:var(--primary);font-size:18px"></i>
        <div>
          <div style="font-size:14px;font-weight:500">Treino</div>
          <div style="font-size:11px;color:var(--text-3)">${s.duration} min · ${s.rolls} rolas · ${s.mode === 'gi' ? 'Gi' : 'No-Gi'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${s.mood != null ? `<div style="display:flex;align-items:center;gap:4px;background:var(--surface-2);padding:4px 10px;border-radius:14px" title="Como se sentiu: ${moodLabel(s.mood)} · ${s.mood}/10"><span style="font-size:16px">${moodEmoji(s.mood)}</span><span style="font-size:11px;color:${moodColor(s.mood)};font-weight:500">${s.mood}</span></div>` : ''}
        <button class="close-btn" data-action="edit-session:${s.id}" title="Editar"><i class="ti ti-edit" style="font-size:14px;color:var(--text-3)"></i></button>
        <button class="close-btn" data-action="del-session:${s.id}" title="Deletar"><i class="ti ti-trash" style="font-size:14px;color:var(--text-3)"></i></button>
      </div>
    </div>
    <div class="session-summary">
      <div><div class="val">${s.rolls}</div><div class="lbl">Rolas</div></div>
      <div><div class="val" style="color:var(--green)">${(s.applied || []).length}</div><div class="lbl">Aplicadas</div></div>
      <div><div class="val" style="color:var(--red)">${(s.suffered || []).length}</div><div class="lbl">Sofridas</div></div>
    </div>
    ${partnersHtml}
    ${rollDetailHtml}
    ${s.notes ? `<div style="margin-top:10px;padding:10px;background:var(--surface-2);border-radius:var(--radius-md);font-size:12px;color:var(--text-2);font-style:italic">${escapeHtml(s.notes)}</div>` : ''}
  </div>`;
}

  const wins = c.matches.filter(m => m.result === 'win').length;
  const losses = c.matches.filter(m => m.result === 'loss').length;
  return `
  <div class="card" style="border-left:3px solid var(--amber)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <i class="ti ti-trophy" style="color:var(--amber);font-size:18px"></i>
          <div style="font-size:14px;font-weight:500">${escapeHtml(c.name || 'Competição')}</div>

        <div style="font-size:11px;color:var(--text-3)">${escapeHtml(c.category || '')}${c.weightClass ? ' · ' + escapeHtml(c.weightClass) : ''}</div>

      <button class="close-btn" data-action="del-comp:${c.id}"><i class="ti ti-trash" style="font-size:14px;color:var(--text-3)"></i></button>

    <div class="session-summary">
      <div><div class="val" style="color:var(--green)">${wins}</div><div class="lbl">Vitórias</div></div>
      <div><div class="val" style="color:var(--red)">${losses}</div><div class="lbl">Derrotas</div></div>
      <div><div class="val">${c.result || '—'}</div><div class="lbl">Resultado</div></div>
    </div>
    ${c.matches.map(m => `<div class="match-bg ${m.result === 'win' ? 'match-win' : 'match-loss'}">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px">${escapeHtml(m.round || 'Luta')}</span>
        <span style="font-size:12px;font-weight:500;color:${m.result === 'win' ? 'var(--green)' : 'var(--red)'}">${m.result === 'win' ? 'VITÓRIA' : 'DERROTA'}</span>
      </div>
      <div style="font-size:13px;margin-bottom:4px">vs ${escapeHtml(m.opponent || 'oponente')}${m.team ? `<span style="color:var(--text-3);font-size:11px"> · ${escapeHtml(m.team)}</span>` : ''}</div>
      <div style="font-size:11px;color:var(--text-2)">${escapeHtml(m.type || '')}${m.submission ? ' · ' + escapeHtml(m.submission) : ''}${m.score ? ' · ' + escapeHtml(m.score) : ''}</div>
    </div>`).join('')}

}

// ---------- STATS ----------
let statsPeriod = 90;
let statsChart = 'bar'; // 'bar' | 'pie'

const PIE_COLORS = ['#ff4444','#ffaa33','#6ee06e','#4488ff','#aa66ff','#ff8866','#66c2c2','#ff66a3','#88cc44','#cc88ff'];

function renderPie(entries, total, opts = {}) {
  // entries: [[name, count], ...]
  if (!entries.length || !total) return '';
  const size = opts.size || 200;
  const cx = size/2, cy = size/2, r = size/2 - 10, innerR = opts.innerR || 0;
  let angle = -Math.PI/2; // start at top
  const slices = entries.map(([name, count], i) => {
    const frac = count / total;
    const a2 = angle + frac * Math.PI * 2;
    const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
    const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
    let path;
    if (entries.length === 1 || frac >= 0.9999) {
      // Full circle - draw as two semicircles to avoid degenerate arc
      path = `M ${cx-r},${cy} A ${r},${r} 0 1 1 ${cx+r},${cy} A ${r},${r} 0 1 1 ${cx-r},${cy} Z`;
    } else if (frac >= 0.5) {
      // Large slice - split into 2 arcs to avoid SVG quirks at exactly 50%
      const mid = angle + Math.PI * frac / 2;
      const xm = cx + r * Math.cos(mid), ym = cy + r * Math.sin(mid);
      path = `M ${cx},${cy} L ${x1},${y1} A ${r},${r} 0 0 1 ${xm},${ym} A ${r},${r} 0 0 1 ${x2},${y2} Z`;
    } else {
      path = `M ${cx},${cy} L ${x1},${y1} A ${r},${r} 0 0 1 ${x2},${y2} Z`;
    }
    const color = PIE_COLORS[i % PIE_COLORS.length];
    // label position
    const labelAngle = angle + frac * Math.PI;
    const lx = cx + (r * 0.6) * Math.cos(labelAngle);
    const ly = cy + (r * 0.6) * Math.sin(labelAngle);
    const result = { path, color, name, count, frac, lx, ly };
    angle = a2;
    return result;
  });

  return `<div style="display:flex;flex-direction:column;align-items:center">
    <svg viewBox="0 0 ${size} ${size}" style="width:${size}px;max-width:100%;height:auto">
      ${slices.map(sl => `<path d="${sl.path}" fill="${sl.color}" stroke="var(--bg)" stroke-width="2"></path>`).join('')}
      ${innerR > 0 ? `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="var(--surface)"/>` : ''}
      ${slices.filter(sl => sl.frac > 0.06).map(sl => `<text x="${sl.lx}" y="${sl.ly}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="11" font-weight="600" font-family="Inter">${Math.round(sl.frac * 100)}%</text>`).join('')}
    </svg>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:14px;width:100%">
      ${slices.map(sl => `<div style="display:flex;align-items:center;gap:8px;font-size:12px">
        <div style="width:10px;height:10px;border-radius:2px;background:${sl.color};flex-shrink:0"></div>
        <span style="flex:1;color:var(--text)">${escapeHtml(sl.name)}</span>
        <span style="color:var(--text-2)">${sl.count} · ${Math.round(sl.frac * 100)}%</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderBars(entries, total) {
  return entries.map(([name, c]) => {
    const pct = total ? Math.round(c / total * 100) : 0;
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:13px">${escapeHtml(name)}</span>
        <span style="font-size:13px;font-weight:500">${c} · <span style="color:var(--primary)">${pct}%</span></span>
      </div>
      <div class="progress-track"><div class="fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderStats() {
  const s = computeStats(statsPeriod);
  const periodLabel = { 7: '7d', 30: '30d', 90: '90d', 9999: 'Tudo' };

  function renderChart(entries, total) {
    if (!entries.length) return `<div style="text-align:center;color:var(--text-3);padding:24px 16px;font-size:12px">
      <i class="ti ti-chart-bar" style="font-size:28px;opacity:0.3;display:block;margin-bottom:8px"></i>
      <div>Sem finalizações aplicadas no período</div>
      <div style="margin-top:6px;font-size:11px;opacity:0.7">Registre um treino com finalização aplicada pra ver o gráfico</div>
    </div>`;
    return statsChart === 'pie' ? renderPie(entries, total) : renderBars(entries, total);
  }

  const combosHtml = s.combos.length ? s.combos.map(([k, c]) => {
    const [pos, sub] = k.split(' → ');
    return `<div class="combo-row">
      <span class="combo-tag pos">${escapeHtml(pos)}</span>
      <i class="ti ti-arrow-right" style="font-size:12px;color:var(--text-4)"></i>
      <span class="combo-tag fin">${escapeHtml(sub)}</span>
      <span class="count">${c}×</span>
    </div>`;
  }).join('') : '<div style="text-align:center;color:var(--text-3);padding:20px;font-size:12px">Sem combinações registradas</div>';

  const sufferedHtml = s.suffered.length ? s.suffered.map(([k, c]) => {
    const [pos, sub] = k.split(' → ');
    return `<div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);padding:12px 14px;border-radius:var(--radius-md);border-left:3px solid var(--primary);margin-bottom:8px">
      <div>
        <div style="font-size:13px">${escapeHtml(pos)} → ${escapeHtml(sub)}</div>
        <div style="font-size:10px;color:var(--text-2);margin-top:2px">Sofrido ${c} ${c === 1 ? 'vez' : 'vezes'}</div>
      </div>
    </div>`;
  }).join('') : '<div style="text-align:center;color:var(--text-3);padding:20px;font-size:12px">Sem vulnerabilidades registradas — ótimo sinal!</div>';

  return `
  <div class="screen">
    <div class="header">
      <h1>Stats</h1>
      ${headerAvatar()}
    </div>
    <div class="toggle">
      <button class="${state.mode === 'gi' ? 'active' : ''}" data-action="mode:gi"><i class="ti ti-shirt" style="font-size:13px;vertical-align:-2px"></i> Gi</button>
      <button class="${state.mode === 'no-gi' ? 'active' : ''}" data-action="mode:no-gi">No-Gi</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:16px">
      <div style="display:flex;gap:6px;overflow-x:auto;flex:1">
        ${[7,30,90,9999].map(d => `<button style="${statsPeriod === d ? 'background:var(--primary);color:#fff;border:none;' : 'background:var(--surface-2);color:var(--text-2);border:1px solid var(--border-2);'}padding:8px 14px;border-radius:16px;font-size:11px;white-space:nowrap" data-action="period:${d}">${periodLabel[d]}</button>`).join('')}
      </div>
      <div style="display:flex;gap:4px;background:var(--surface-2);padding:3px;border-radius:14px;border:1px solid var(--border-2)">
        <button style="background:${statsChart === 'bar' ? 'var(--primary)' : 'transparent'};color:${statsChart === 'bar' ? '#fff' : 'var(--text-2)'};border:none;padding:6px 8px;border-radius:11px;display:flex;align-items:center" data-action="chart:bar" title="Barras"><i class="ti ti-chart-bar" style="font-size:14px"></i></button>
        <button style="background:${statsChart === 'pie' ? 'var(--primary)' : 'transparent'};color:${statsChart === 'pie' ? '#fff' : 'var(--text-2)'};border:none;padding:6px 8px;border-radius:11px;display:flex;align-items:center" data-action="chart:pie" title="Pizza"><i class="ti ti-chart-pie" style="font-size:14px"></i></button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">De onde vem suas finalizações</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:14px">Posição de origem · ${s.totalApplied} finalizações</div>
      ${renderChart(s.positions, s.totalApplied)}
    </div>

    <div class="card">
      <div class="card-label">Quais finalizações você aplica</div>
      <div style="font-size:11px;color:var(--text-3);margin-bottom:14px">Tipo de finalização · ${s.totalApplied} finalizações</div>
      ${renderChart(s.subs, s.totalApplied)}
    </div>

    <div class="card">
      <div class="card-label">Combinações mais frequentes</div>
      ${combosHtml}
    </div>

    <div class="card">
      <div class="card-label">Onde você tem caído</div>
      ${sufferedHtml}
    </div>
  </div>`;
}

// ---------- COMPS LIST ----------
function renderComps() {
  const comps = getCompsForMode().slice().sort((a,b) => b.date.localeCompare(a.date));
  let body = '';
  if (comps.length === 0) {
    body = `<div class="empty"><i class="ti ti-trophy"></i><p>Nenhuma competição registrada<br><span style="color:var(--text-4)">${state.mode === 'gi' ? 'no Gi' : 'no No-Gi'}</span></p></div>`;
  } else {
    body = comps.map(c => {
      const wins = c.matches.filter(m => m.result === 'win').length;
      const losses = c.matches.filter(m => m.result === 'loss').length;
      return `<div class="list-item" data-action="view-comp:${c.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:500;margin-bottom:2px">${escapeHtml(c.name || 'Competição')}</div>
            <div style="font-size:11px;color:var(--text-3)">${fmtDateLong(c.date)}</div>
          </div>
          ${c.result ? `<span class="pill pill-amber"><i class="ti ti-medal" style="font-size:11px"></i> ${escapeHtml(c.result)}</span>` : ''}
        </div>
        <div style="display:flex;gap:10px;font-size:11px;color:var(--text-2)">
          <span><span style="color:var(--green)">${wins}V</span> · <span style="color:var(--red)">${losses}D</span></span>
          ${c.category ? `<span>·</span><span>${escapeHtml(c.category)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }
  return `
  <div class="screen">
    <div class="header"><h1>Competições</h1>${headerAvatar()}</div>
    <div class="toggle">
      <button class="${state.mode === 'gi' ? 'active' : ''}" data-action="mode:gi"><i class="ti ti-shirt" style="font-size:13px;vertical-align:-2px"></i> Gi</button>
      <button class="${state.mode === 'no-gi' ? 'active' : ''}" data-action="mode:no-gi">No-Gi</button>
    </div>
    ${body}
    <button class="btn-primary" style="margin-top:12px" data-action="open:new-comp"><i class="ti ti-plus" style="vertical-align:-2px"></i> Nova competição</button>
  </div>`;
}

// ---------- PARTNERS ----------
function renderPartners() {
  const partners = state.data.partners.slice().sort((a,b) => a.name.localeCompare(b.name));
  // Compute stats per partner across both modes
  const partnerStats = {};
  state.data.sessions.forEach(s => {
    (s.applied || []).forEach(a => {
      if (a.partnerId) {
        if (!partnerStats[a.partnerId]) partnerStats[a.partnerId] = { rolls: 0, applied: 0, suffered: 0 };
        partnerStats[a.partnerId].applied++;
      }
    });
    (s.partners || []).forEach(pid => {
      if (!partnerStats[pid]) partnerStats[pid] = { rolls: 0, applied: 0, suffered: 0 };
      partnerStats[pid].rolls++;
    });
  });

  let body = '';
  if (partners.length === 0) {
    body = `<div class="empty"><i class="ti ti-users"></i><p>Nenhum parceiro cadastrado<br><span style="color:var(--text-4)">Adicione parceiros recorrentes pra contextualizar suas estatísticas</span></p></div>`;
  } else {
    body = partners.map(p => {
      const stats = partnerStats[p.id] || { rolls: 0, applied: 0, suffered: 0 };
      const beltColor = `belt-${p.belt.toLowerCase()}`;
      return `<div class="card partner-card" data-action="edit-partner:${p.id}" style="cursor:pointer">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div class="partner-avatar" style="width:40px;height:40px;font-size:13px;border:2px solid">
            <span class="${beltColor}" style="width:8px;height:8px;border-radius:50%;display:inline-block;position:absolute;margin-top:-30px;margin-left:24px"></span>
            ${initials(p.name)}
          </div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:500">${escapeHtml(p.name)}</div>
            <div style="font-size:11px;color:var(--text-2)">${escapeHtml(p.belt)} · ${p.weight}kg${p.gym ? ' · ' + escapeHtml(p.gym) : ''}</div>
          </div>
          <div style="background:var(--surface-2);padding:6px 10px;border-radius:14px;display:flex;align-items:center;gap:4px;flex-shrink:0">
            <i class="ti ti-edit" style="font-size:12px;color:var(--text-2)"></i>
            <span style="font-size:11px;color:var(--text-2);font-weight:500">Editar</span>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:var(--surface-2);padding:8px;border-radius:var(--radius-md);text-align:center">
            <div style="font-family:'Bebas Neue';font-size:18px">${stats.rolls}</div>
            <div style="font-size:9px;color:var(--text-2);letter-spacing:1px">ROLAS</div>
          </div>
          <div style="flex:1;background:var(--surface-2);padding:8px;border-radius:var(--radius-md);text-align:center">
            <div style="font-family:'Bebas Neue';font-size:18px;color:var(--green)">${stats.applied}</div>
            <div style="font-size:9px;color:var(--text-2);letter-spacing:1px">FINS APLIC</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  return `
  <div class="screen">
    <div class="header"><h1>Parceiros</h1>${headerAvatar()}</div>
    ${body}
    <button class="btn-primary" style="margin-top:12px" data-action="open:new-partner"><i class="ti ti-plus" style="vertical-align:-2px"></i> Adicionar parceiro</button>
  </div>`;
}

    <div class="stat-grid">

      <div class="stat">

        <div class="stat-value">${new Date().getFullYear() - p.startedAt}<span style="font-size:14px;color:var(--text-4)">a</span></div>

        <div style="width:1px;background:var(--border-2)"></div>
        <div><div style="font-family:'Bebas Neue';font-size:24px">${nogiSessions}</div><div style="font-size:10px;color:var(--text-2)">NO-GI</div></div>

    </div>

    ${(() => {

      if (recaps.length === 0) return '';

            <div style="font-size:22px">🎁</div>

    <button class="btn-secondary" style="margin-top:12px" data-action="open:edit-profile"><i class="ti ti-edit" style="vertical-align:-2px"></i> Editar perfil</button>
    <button class="btn-dashed" style="margin-top:8px" data-action="logout"><i class="ti ti-logout" style="vertical-align:-2px"></i> Sair</button>
    <p style="text-align:center;font-size:10px;color:var(--text-3);margin-top:20px">Logado como ${escapeHtml(state.currentUser)}</p>
  </div>`;
}
